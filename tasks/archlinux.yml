---
- name: Update pacman cache
  become: true
  community.general.pacman:
    update_cache: true
  changed_when: false
  when: ansible_os_family == 'Archlinux'

- name: Install ghostty
  become: true
  community.general.pacman:
    name:
      - ghostty
    state: present
  when: ansible_os_family == 'Archlinux'
