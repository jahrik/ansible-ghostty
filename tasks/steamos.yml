---
- name: Ensure ~/.local/bin exists
  become: false
  ansible.builtin.file:
    path: ~/.local/bin
    state: directory
    mode: '0755'

- name: Get latest ghostty release info
  become: false
  ansible.builtin.uri:
    url: https://api.github.com/repos/ghostty-org/ghostty/releases/tags/v{{ ghostty_steamos_version }}
    return_content: true
  register: ghostty_release

- name: Download ghostty AppImage
  become: false
  ansible.builtin.get_url:
    url: "{{ ghostty_release.json.assets | selectattr('name', 'search', 'ghostty.*\\.AppImage$') | map(attribute='browser_download_url') | first }}"
    dest: ~/.local/bin/ghostty
    mode: '0755'
    creates: ~/.local/bin/ghostty

- name: Create ~/.local/share/applications directory
  become: false
  ansible.builtin.file:
    path: ~/.local/share/applications
    state: directory
    mode: '0755'

- name: Create ~/.local/share/icons directory
  become: false
  ansible.builtin.file:
    path: ~/.local/share/icons
    state: directory
    mode: '0755'

- name: Deploy ghostty icon
  become: false
  ansible.builtin.copy:
    src: ghostty.png
    dest: ~/.local/share/icons/ghostty.png
    mode: '0644'

- name: Deploy ghostty desktop entry
  become: false
  ansible.builtin.template:
    src: ghostty.desktop.j2
    dest: ~/.local/share/applications/ghostty.desktop
    mode: '0644'
  register: ghostty_desktop_entry

- name: Check for kbuildsycoca6
  ansible.builtin.command: which kbuildsycoca6
  register: kbuildsycoca6
  changed_when: false
  failed_when: false

- name: Refresh KDE desktop database
  become: false
  ansible.builtin.command: kbuildsycoca6
  changed_when: false
  when: ghostty_desktop_entry.changed and kbuildsycoca6.rc == 0
