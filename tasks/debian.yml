---
- name: Install prerequisites
  become: true
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gpg
      - python3-debian
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Include Ubuntu PPA setup
  ansible.builtin.include_tasks: ubuntu_ppa.yml
  when: ansible_facts['distribution'] == 'Ubuntu'

- name: Include Debian repo setup
  ansible.builtin.include_tasks: debian_repo.yml
  when: ansible_facts['distribution'] == 'Debian'

- name: Install ghostty
  become: true
  ansible.builtin.apt:
    name: ghostty
    state: present
    update_cache: true
