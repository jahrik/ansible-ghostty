---
- name: Check if ghostty repo keyring exists
  become: true
  ansible.builtin.stat:
    path: /usr/share/keyrings/debian.griffo.io.gpg
  register: ghostty_keyring

- name: Download ghostty repo signing key
  become: true
  ansible.builtin.get_url:
    url: https://debian.griffo.io/EA0F721D231FDD3A0A17B9AC7808B4DD62C41256.asc
    dest: /usr/share/keyrings/debian.griffo.io.asc
    mode: "0644"
  when: not ghostty_keyring.stat.exists

- name: Dearmor ghostty repo signing key
  become: true
  ansible.builtin.command: gpg --dearmor -o /usr/share/keyrings/debian.griffo.io.gpg /usr/share/keyrings/debian.griffo.io.asc
  args:
    creates: /usr/share/keyrings/debian.griffo.io.gpg

- name: Add ghostty apt repository
  become: true
  ansible.builtin.deb822_repository:
    name: ghostty
    types: deb
    uris: "https://debian.griffo.io/apt"
    suites: "{{ ansible_facts['distribution_release'] }}"
    components: main
    signed_by: /usr/share/keyrings/debian.griffo.io.gpg
