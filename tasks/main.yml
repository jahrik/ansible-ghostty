---
- name: Install ghostty
  ansible.builtin.include_tasks:
    file: install.yml
    apply:
      tags:
        - ghostty
        - ghostty:install
  when: install | default(true) | bool
  tags:
    - ghostty
    - ghostty:install

- name: Uninstall ghostty
  ansible.builtin.include_tasks:
    file: uninstall.yml
    apply:
      tags:
        - ghostty
        - ghostty:uninstall
  when: not (install | default(true) | bool)
  tags:
    - ghostty
    - ghostty:uninstall
