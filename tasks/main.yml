---
- name: Install ghostty
  ansible.builtin.include_tasks: install.yml
  when: install | default(true) | bool
  tags:
    - ghostty
    - ghostty:install

- name: Uninstall ghostty
  ansible.builtin.include_tasks: uninstall.yml
  when: not (install | default(true) | bool)
  tags:
    - ghostty
    - ghostty:uninstall
